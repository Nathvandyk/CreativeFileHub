<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- App background: deep zinc, matches the app's dark UI -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2b31"/>
      <stop offset="0.55" stop-color="#141417"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <!-- Folder body: the app's blue accent -->
    <linearGradient id="folder" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#7cb6ff"/>
      <stop offset="0.45" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Folder back panel, darker -->
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#172a80"/>
    </linearGradient>
    <!-- Spark -->
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded-square app tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Subtle top highlight edge -->
  <rect x="8" y="8" width="1008" height="1008" rx="194" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="10"/>

  <!-- Folder back panel with tab -->
  <path filter="url(#softShadow)" fill="url(#folderBack)" d="
    M 196 348
    q 0 -34 34 -34
    l 168 0
    q 26 0 42 20
    l 34 42
    l 320 0
    q 34 0 34 34
    l 0 60
    l -632 0
    Z"/>

  <!-- Folder front panel -->
  <path fill="url(#folder)" d="
    M 178 448
    q 2 -32 36 -32
    l 596 0
    q 34 0 32 32
    l -22 274
    q -3 34 -37 34
    l -540 0
    q -34 0 -37 -34
    Z"/>
  <!-- Front panel top highlight -->
  <path fill="#ffffff" fill-opacity="0.22" d="
    M 178 448
    q 2 -32 36 -32
    l 596 0
    q 34 0 32 32
    l -2 24
    l -660 0
    Z"/>

  <!-- Hub spark: glow + 4-point star, top right -->
  <circle cx="756" cy="330" r="190" fill="url(#glow)"/>
  <path fill="url(#spark)" d="
    M 756 208
    C 768 282 786 300 860 312
    C 786 324 768 342 756 416
    C 744 342 726 324 652 312
    C 726 300 744 282 756 208 Z"/>
  <!-- Two companion sparks -->
  <path fill="url(#spark)" opacity="0.95" d="
    M 872 396
    C 877 424 884 431 912 436
    C 884 441 877 448 872 476
    C 867 448 860 441 832 436
    C 860 431 867 424 872 396 Z"/>
  <circle cx="676" cy="426" r="14" fill="#fde68a"/>
</svg>
